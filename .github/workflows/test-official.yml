name: Test Official Action

on:
  workflow_dispatch:
  push:

jobs:
  test-clean:
    name: Clean notebook (should pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: kynan/nbstripout@main
        with:
          paths: "clean.ipynb"

  test-dirty:
    name: Dirty notebook (should fail)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: kynan/nbstripout@main
        with:
          paths: "dirty.ipynb"

  test-special-chars:
    name: Special character paths (expected to fail with official)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: kynan/nbstripout@main
        with:
          paths: "**/*.ipynb"
